version: '3.8'

services:
  db:
    image: postgres:15-alpine
    container_name: uav-postgres
    ports:
      - "5432:5432"
    environment:
      - POSTGRES_DB=uavpms
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=postgrespassword
    volumes:
      - pgdata:/var/lib/postgresql/data
    restart: always

  redis:
    image: redis:alpine
    container_name: uav-redis
    ports:
      - "6379:6379"
    restart: always

  webapi:
    image: uavpms-webapi:latest
    container_name: uav-webapi
    build:
      context: .
      dockerfile: Dockerfile
      network: host
    ports:
      - "5194:8080"
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - ConnectionStrings__DefaultConnection=${DB_CONNECTION}
      - Redis__ConnectionString=${REDIS_CONNECTION}
      - Redis__Password=${REDIS_PASSWORD}
      - Jwt__SecretKey=${JWT_SECRET}
      - Jwt__Issuer=${JWT_ISSUER}
      - Jwt__Audience=${JWT_AUDIENCE}
      - Jwt__ExpiryMinutes=${JWT_EXPIRY_MINUTES}
      - SendGrid__ApiKey=${SENDGRID_API_KEY}
      - SendGrid__FromEmail=${SENDGRID_FROM_EMAIL}
      - SendGrid__FromName=${SENDGRID_FROM_NAME}
    depends_on:
      - db
      - redis
    restart: always

volumes:
  pgdata:
